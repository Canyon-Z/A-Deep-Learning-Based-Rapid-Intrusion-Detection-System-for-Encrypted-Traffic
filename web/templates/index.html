<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密流量入侵检测系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #081018;
            --bg-1: #0f1e2a;
            --bg-2: #173144;
            --surface: rgba(10, 24, 36, 0.78);
            --surface-border: rgba(116, 166, 190, 0.3);
            --text-main: #e6f3ff;
            --text-sub: #9bb9cc;
            --accent: #28d0a7;
            --accent-2: #5fc0ff;
            --danger: #ff6f61;
            --success: #2ee68f;
            --shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 10% 12%, #1f4a67 0%, transparent 36%),
                radial-gradient(circle at 86% 24%, #1e7568 0%, transparent 30%),
                linear-gradient(140deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .page-shell {
            width: min(960px, 100%);
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: rise-up 460ms ease-out;
        }

        .hero {
            padding: 34px 30px 18px;
            border-bottom: 1px solid rgba(150, 190, 210, 0.2);
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font: 700 12px/1 "Space Grotesk", sans-serif;
            letter-spacing: 0.12em;
            color: #c9f6e9;
            text-transform: uppercase;
            background: rgba(42, 216, 172, 0.14);
            border: 1px solid rgba(69, 223, 186, 0.35);
            border-radius: 999px;
            padding: 8px 12px;
        }

        .title {
            margin: 14px 0 8px;
            font-weight: 800;
            font-size: clamp(1.45rem, 2.7vw, 2.1rem);
            line-height: 1.25;
        }

        .subtitle {
            margin: 0;
            color: var(--text-sub);
            font-size: 0.98rem;
        }

        .content {
            padding: 24px 30px 30px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 18px;
        }

        .panel {
            background: rgba(9, 20, 31, 0.64);
            border: 1px solid rgba(131, 177, 201, 0.23);
            border-radius: 16px;
            padding: 18px;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 1.02rem;
            font-weight: 700;
        }

        .drop-zone {
            position: relative;
            border: 1.5px dashed rgba(121, 194, 228, 0.45);
            border-radius: 14px;
            min-height: 170px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 18px;
            transition: all 220ms ease;
            background: linear-gradient(180deg, rgba(20, 49, 66, 0.52), rgba(10, 23, 34, 0.52));
        }

        .drop-zone.is-dragging {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 0 0 4px rgba(40, 208, 167, 0.15);
        }

        .drop-zone p {
            margin: 6px 0;
            color: var(--text-sub);
        }

        .file-pill {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #dcf7ff;
            border: 1px solid rgba(111, 194, 232, 0.45);
            border-radius: 999px;
            padding: 6px 12px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: none;
        }

        .action-row {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-primary {
            border: none;
            border-radius: 10px;
            padding: 11px 18px;
            cursor: pointer;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
            color: #032b1e;
            background: linear-gradient(90deg, #22d2ad, #72e8cc);
            transition: transform 170ms ease, filter 170ms ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .btn-secondary {
            border: 1px solid rgba(130, 171, 196, 0.4);
            background: rgba(18, 37, 52, 0.66);
            color: #d8ebf8;
            border-radius: 10px;
            padding: 11px 14px;
            cursor: pointer;
        }

        .hint {
            font-size: 0.88rem;
            color: #95b2c6;
        }

        .state {
            margin-top: 14px;
            min-height: 22px;
            font-size: 0.9rem;
            color: #b7d1e1;
        }

        .state.error {
            color: var(--danger);
        }

        .state.loading {
            color: var(--accent-2);
        }

        .result-card {
            height: 100%;
            display: none;
            animation: fade-in 280ms ease-out;
        }

        .result-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 5px 10px;
            border-radius: 999px;
            font: 700 12px/1 "Space Grotesk", sans-serif;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            background: rgba(95, 192, 255, 0.2);
            border: 1px solid rgba(95, 192, 255, 0.5);
            color: #bce8ff;
        }

        .result-title {
            margin: 8px 0 6px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .confidence-wrap {
            margin-top: 12px;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #b1d0e2;
            margin-bottom: 6px;
        }

        .confidence-bar {
            width: 100%;
            height: 10px;
            background: rgba(82, 129, 158, 0.32);
            border-radius: 999px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #6ab5ff, #32e39f);
            transition: width 300ms ease;
        }

        .result-note {
            margin-top: 10px;
            color: #9bbacd;
            font-size: 0.87rem;
        }

        .advice-wrap {
            margin-top: 14px;
            border-top: 1px solid rgba(130, 171, 196, 0.26);
            padding-top: 12px;
        }

        .advice-title {
            margin: 0 0 8px;
            font-size: 0.92rem;
            font-weight: 700;
            color: #d7eeff;
        }

        .advice-content {
            margin: 0;
            font-size: 0.88rem;
            line-height: 1.6;
            color: #b9d8ea;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 220px;
            overflow: auto;
            padding-right: 4px;
        }

        .result-title.safe {
            color: var(--success);
        }

        .result-title.risk {
            color: var(--danger);
        }

        input[type="file"] {
            display: none;
        }

        @keyframes rise-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 860px) {
            .content {
                grid-template-columns: 1fr;
            }

            .hero,
            .content {
                padding-left: 18px;
                padding-right: 18px;
            }

            .action-row {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <section class="hero">
            <span class="kicker">Encrypted Traffic IDS</span>
            <h1 class="title">基于深度学习的加密流量入侵检测系统</h1>
            <p class="subtitle">上传 PCAP 文件后，系统会自动提取特征并输出检测结果、置信度与 AI 总结建议。</p>
        </section>

        <section class="content">
            <article class="panel">
                <h2>上传流量文件</h2>
                <form id="uploadForm" novalidate>
                    <label class="drop-zone" id="dropZone" for="pcapFile">
                        <strong>拖拽文件到这里，或点击选择文件</strong>
                        <p>支持格式：`.pcap`、`.pcapng`</p>
                        <div class="file-pill" id="fileNamePill"></div>
                    </label>
                    <input type="file" id="pcapFile" accept=".pcap,.pcapng">

                    <div class="action-row">
                        <button type="submit" class="btn-primary" id="submitBtn">开始检测</button>
                        <button type="button" class="btn-secondary" id="clearBtn">清空选择</button>
                    </div>

                    <p class="hint">提示：文件越大处理时间越长，请耐心等待。</p>
                    <div class="state" id="stateText"></div>
                </form>
            </article>

            <article class="panel result-card" id="resultCard">
                <span class="result-badge">Detection Result</span>
                <h3 class="result-title" id="resultStatus">-</h3>

                <div class="confidence-wrap">
                    <div class="confidence-label">
                        <span>置信度</span>
                        <span id="confidenceScore">0%</span>
                    </div>
                    <div class="confidence-bar" aria-hidden="true">
                        <div class="confidence-fill" id="confidenceFill"></div>
                    </div>
                </div>

                <p class="result-note" id="resultNote">等待检测结果...</p>

                <div class="advice-wrap">
                    <h4 class="advice-title">AI 总结与建议</h4>
                    <p class="advice-content" id="adviceContent">等待检测结果...</p>
                </div>
            </article>
        </section>
    </main>

    <script>
        const uploadForm = document.getElementById("uploadForm");
        const fileInput = document.getElementById("pcapFile");
        const dropZone = document.getElementById("dropZone");
        const fileNamePill = document.getElementById("fileNamePill");
        const stateText = document.getElementById("stateText");
        const resultCard = document.getElementById("resultCard");
        const resultStatus = document.getElementById("resultStatus");
        const confidenceScore = document.getElementById("confidenceScore");
        const confidenceFill = document.getElementById("confidenceFill");
        const resultNote = document.getElementById("resultNote");
        const adviceContent = document.getElementById("adviceContent");
        const submitBtn = document.getElementById("submitBtn");
        const clearBtn = document.getElementById("clearBtn");
        let advicePollTimer = null;

        function showState(message, type) {
            stateText.textContent = message;
            stateText.className = "state";
            if (type) {
                stateText.classList.add(type);
            }
        }

        function getSafePercent(value) {
            const numeric = typeof value === "number" ? value : parseFloat(value);
            if (Number.isNaN(numeric)) {
                return 0;
            }
            const base = numeric <= 1 ? numeric * 100 : numeric;
            return Math.max(0, Math.min(100, base));
        }

        function updateSelectedFileView() {
            const selected = fileInput.files && fileInput.files[0];
            if (!selected) {
                fileNamePill.style.display = "none";
                fileNamePill.textContent = "";
                return;
            }
            fileNamePill.style.display = "inline-block";
            fileNamePill.textContent = selected.name;
        }

        function wireDragAndDrop() {
            ["dragenter", "dragover"].forEach((eventName) => {
                dropZone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    dropZone.classList.add("is-dragging");
                });
            });

            ["dragleave", "drop"].forEach((eventName) => {
                dropZone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    dropZone.classList.remove("is-dragging");
                });
            });

            dropZone.addEventListener("drop", (event) => {
                const files = event.dataTransfer && event.dataTransfer.files;
                if (!files || files.length === 0) {
                    return;
                }
                fileInput.files = files;
                updateSelectedFileView();
                showState("已选择文件，点击“开始检测”即可分析。", "");
            });
        }

        fileInput.addEventListener("change", () => {
            updateSelectedFileView();
            if (fileInput.files.length > 0) {
                showState("文件已就绪，等待开始检测。", "");
            }
        });

        clearBtn.addEventListener("click", () => {
            if (advicePollTimer) {
                clearTimeout(advicePollTimer);
                advicePollTimer = null;
            }
            fileInput.value = "";
            updateSelectedFileView();
            resultCard.style.display = "none";
            adviceContent.textContent = "等待检测结果...";
            showState("已清空文件选择。", "");
        });

        async function pollAdvice(requestId, retries = 20, intervalMs = 1200) {
            if (!requestId) {
                adviceContent.textContent = "未提供建议请求ID。";
                return;
            }

            try {
                const response = await fetch(`/advice/${requestId}`);
                if (!response.ok) {
                    throw new Error("advice request failed");
                }

                const data = await response.json();
                if (data.status === "done") {
                    adviceContent.textContent = (data.advice || "未返回 AI 建议。").trim();
                    showState("检测完成，AI建议已更新。", "");
                    return;
                }

                if (data.status === "error") {
                    adviceContent.textContent = (data.advice || "AI 建议生成失败。").trim();
                    showState("检测完成，AI建议生成失败。", "error");
                    return;
                }

                if (data.status === "disabled") {
                    adviceContent.textContent = "未启用本地大语言模型建议。";
                    return;
                }

                if (retries <= 0) {
                    adviceContent.textContent = "AI 建议生成超时，请稍后重试。";
                    showState("检测完成，AI建议生成超时。", "error");
                    return;
                }

                advicePollTimer = setTimeout(() => {
                    pollAdvice(requestId, retries - 1, intervalMs);
                }, intervalMs);
            } catch (error) {
                console.error("Advice poll error:", error);
                adviceContent.textContent = "AI 建议获取失败。";
            }
        }

        wireDragAndDrop();

        uploadForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (!fileInput.files || fileInput.files.length === 0) {
                showState("请先选择 PCAP 文件。", "error");
                return;
            }

            const file = fileInput.files[0];
            const ext = file.name.split(".").pop().toLowerCase();
            if (!(ext === "pcap" || ext === "pcapng")) {
                showState("文件格式不正确，仅支持 .pcap 或 .pcapng。", "error");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            submitBtn.disabled = true;
            submitBtn.textContent = "检测中...";
            showState("正在提取特征并进行检测，请稍候。", "loading");

            try {
                if (advicePollTimer) {
                    clearTimeout(advicePollTimer);
                    advicePollTimer = null;
                }

                const response = await fetch("/analyze", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("analyze request failed");
                }

                const data = await response.json();
                const percent = getSafePercent(data.confidence);

                resultStatus.textContent = data.result || "Unknown";
                resultStatus.className = "result-title";
                if ((data.result || "").toLowerCase().includes("normal")) {
                    resultStatus.classList.add("safe");
                    resultNote.textContent = "当前检测倾向于正常流量。";
                } else {
                    resultStatus.classList.add("risk");
                    resultNote.textContent = "请结合日志与上下文进一步排查可疑行为。";
                }

                confidenceScore.textContent = `${percent.toFixed(2)}%`;
                confidenceFill.style.width = `${percent}%`;
                resultCard.style.display = "block";

                if (data.advice_status === "pending") {
                    adviceContent.textContent = "AI 正在生成建议，请稍候...";
                    showState("检测完成，正在生成 AI 建议...", "loading");
                    pollAdvice(data.request_id);
                } else if (data.advice_status === "disabled") {
                    adviceContent.textContent = "未启用本地大语言模型建议。";
                    showState("检测完成。", "");
                } else {
                    adviceContent.textContent = "未返回 AI 建议。";
                    showState("检测完成。", "");
                }
            } catch (error) {
                console.error("Analyze error:", error);
                showState("检测失败，请稍后重试或查看服务端日志。", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "开始检测";
            }
        });
    </script>
</body>
</html>
