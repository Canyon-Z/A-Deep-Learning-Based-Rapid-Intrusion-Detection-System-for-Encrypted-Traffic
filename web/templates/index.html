<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密流量入侵检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">基于深度学习的加密流量入侵检测系统</h1>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">上传流量文件 (PCAP)</h5>
                <form id="uploadForm">
                    <div class="mb-3">
                        <input class="form-control" type="file" id="pcapFile" accept=".pcap,.pcapng">
                    </div>
                    <button type="submit" class="btn btn-primary">开始检测</button>
                </form>
            </div>
        </div>

        <div id="resultArea" class="mt-4" style="display: none;">
            <div class="card">
                <div class="card-header">检测结果</div>
                <div class="card-body">
                    <h5 class="card-title" id="resultStatus"></h5>
                    <p class="card-text">置信度: <span id="confidenceScore"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pcapFile');
            if(fileInput.files.length === 0) return alert("请选择文件");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'none';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                document.getElementById('resultStatus').textContent = data.result;
                document.getElementById('confidenceScore').textContent = data.confidence;
                resultArea.style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                alert("检测失败，请查看控制台");
            }
        });
    </script>
</body>
</html>
